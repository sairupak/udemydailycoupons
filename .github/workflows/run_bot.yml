name: Run Automated Deal Engine

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  scrape_and_post:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      # Upgraded from v4 to v6 to natively support the Node 24 runtime
      uses: actions/checkout@v6

    - name: Set up Python
      # Upgraded from v5 to v6 to natively support the Node 24 runtime
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install requests

    - name: Execute Deal Scraper
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
      run: python bot.py
